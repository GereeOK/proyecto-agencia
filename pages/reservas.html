<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Reserva de servicios turísticos con Baires Essence" />
  <title>Reserva | Baires Essence</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header>
    <div class="container">
      <nav aria-label="Navegación Principal">
        <ul class="navbar">
          <li><a href="../index.html#inicio">Inicio</a></li>
          <li><a href="../index.html#nosotros">Nosotros</a></li>
          <li><a href="../index.html#servicios">Servicios</a></li>
          <li><a href="../index.html#contacto">Contacto</a></li>
          <li><a href="../pages/reservas.html" id="mis-reservas-link">Mis Reservas</a></li>
          <li><button id="login-btn">Iniciar sesión</button></li>
          <li><button id="logout-btn" class="hidden">Cerrar sesión</button></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="reservas-page">
    <aside id="selected-services">
      <h2>Servicios Seleccionados</h2>
    </aside>

    <section id="form-reserva">
      <h1>Completa tu Reserva</h1>
      <form id="booking-form">
        <div class="form-group">
          <label for="checkin">Fecha de inicio</label>
          <input type="date" id="checkin" name="checkin" required />
        </div>
        <div class="form-group">
          <label for="checkout">Fecha de fin</label>
          <input type="date" id="checkout" name="checkout" required />
        </div>
        <div class="form-group">
          <label for="fullname">Nombre completo</label>
          <input type="text" id="fullname" name="fullname" placeholder="Tu nombre" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="tu@ejemplo.com" required />
        </div>
        <div class="form-group">
          <label for="services-boxes">Agregar servicios</label>
          <div id="services-boxes" class="service-options"></div>
        </div>
        <button type="submit" class="btn-reservar">Enviar reserva</button>
      </form>
      <div id="booking-success" class="success-message" style="display:none">
        ¡Reserva confirmada! Pronto recibirás un correo de confirmación.
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <p>&copy; 2025 Baires Essence. Todos los derechos reservados.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script type="module" src="../js/main.js"></script>
</body>
</html>
