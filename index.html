<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Agencia de turismo en Buenos Aires: translados, city tours, cenas, estancias y más." />
  <title>Baires Essence</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
  <div id="header"></div>
  <main>
    <div id="hero"></div>
    <div id="about"></div>
    <div id="services"></div>
    <div id="testimonials"></div>
  </main>
  <div id="contact"></div>
  <div id="footer"></div>

  <!-- Carga de parciales -->
  <script>
    const includes = ["header", "hero", "about", "services", "testimonials", "contact", "footer"];
    includes.forEach(id => {
      fetch(`./partials/${id}.html`)
        .then(res => res.text())
        .then(html => document.getElementById(id).innerHTML = html);
    });
  </script>

  <!-- Importa el main.js como módulo -->
  <script type="module" src="./js/main.js"></script>
</body>
</html>
